<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Extractor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <main class="glass-panel">
        <header>
            <h1>AI Web Scraper</h1>
            <p>Intelligently extract structured data from any website.</p>
        </header>

        <section class="input-section">
            <div class="form-group">
                <label for="url">Website URL</label>
                <input type="url" id="url" placeholder="https://example.com" required>
            </div>
            
            <div class="form-group">
                <label for="prompt">What do you want to extract?</label>
                <input type="text" id="prompt" placeholder="e.g. Extract product names, prices and descriptions" required>
            </div>

            <button id="scrapeBtn" class="primary-btn">
                <span class="btn-text">Scrape Data</span>
                <div class="loader hidden" id="spinner"></div>
            </button>
            <div id="errorMsg" class="error-msg hidden"></div>
        </section>

        <section id="resultsSection" class="results-section hidden">
            <div class="results-header">
                <h2>Extracted Data</h2>
                <div class="export-actions">
                    <button class="export-btn" data-format="json">JSON</button>
                    <button class="export-btn" data-format="csv">CSV</button>
                    <button class="export-btn" data-format="md">MD</button>
                    <button class="export-btn" data-format="txt">TXT</button>
                </div>
            </div>
            
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr id="tableHeadRow"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../static/script.js"></script>
</body>
</html>
